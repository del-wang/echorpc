<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WS JSON-RPC Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        min-height: 100vh;
        padding: 24px;
      }
      h1 {
        font-size: 1.5rem;
        margin-bottom: 16px;
        color: #38bdf8;
      }
      h2 {
        font-size: 1.1rem;
        margin-bottom: 8px;
        color: #94a3b8;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        max-width: 1200px;
        margin: 0 auto;
      }
      .card {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 16px;
      }
      .full {
        grid-column: 1 / -1;
      }

      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }
      .dot.off {
        background: #ef4444;
      }
      .dot.on {
        background: #22c55e;
      }

      button {
        background: #3b82f6;
        color: white;
        border: none;
        border-radius: 6px;
        padding: 8px 16px;
        cursor: pointer;
        font-size: 0.85rem;
        margin: 4px;
      }
      button:hover {
        background: #2563eb;
      }
      button:disabled {
        background: #475569;
        cursor: not-allowed;
      }
      button.danger {
        background: #ef4444;
      }
      button.danger:hover {
        background: #dc2626;
      }

      input {
        background: #0f172a;
        color: #e2e8f0;
        border: 1px solid #475569;
        border-radius: 6px;
        padding: 8px;
        font-family: monospace;
        font-size: 0.85rem;
        width: 100%;
      }

      .log {
        background: #020617;
        border: 1px solid #1e293b;
        border-radius: 6px;
        padding: 12px;
        height: 300px;
        overflow-y: auto;
        font-family: monospace;
        font-size: 0.8rem;
        line-height: 1.6;
      }
      .log .time {
        color: #64748b;
      }
      .log .in {
        color: #22c55e;
      }
      .log .out {
        color: #38bdf8;
      }
      .log .err {
        color: #ef4444;
      }
      .log .evt {
        color: #a78bfa;
      }

      .row {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 8px;
      }
      .row label {
        min-width: 80px;
        color: #94a3b8;
        font-size: 0.85rem;
      }
      .row input {
        flex: 1;
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <!-- Connection -->
      <div class="card full">
        <h2>Connection</h2>
        <div class="status">
          <div class="dot off" id="statusDot"></div>
          <span id="statusText">Disconnected</span>
        </div>
        <div class="row">
          <label>URL</label>
          <input id="wsUrl" value="ws://localhost:9100" />
        </div>
        <div class="row">
          <label>Token</label>
          <input id="wsToken" value="demo-token" />
        </div>
        <div>
          <button id="btnConnect">Connect</button>
          <button id="btnDisconnect" class="danger" disabled>Disconnect</button>
        </div>
      </div>

      <!-- RPC Call -->
      <div class="card">
        <h2>RPC Call</h2>
        <div class="row">
          <label>Method</label>
          <input
            id="rpcMethod"
            value="echo"
            placeholder="e.g. echo, add, server.time"
          />
        </div>
        <div class="row">
          <label>Params</label>
          <input
            id="rpcParams"
            value='{"msg": "hello from web"}'
            placeholder='JSON, e.g. {"a":1,"b":2}'
          />
        </div>
        <button id="btnCall" disabled>Call</button>
        <button id="btnCallAdd" disabled>add(3, 7)</button>
        <button id="btnCallTime" disabled>server.time()</button>
      </div>

      <!-- Events -->
      <div class="card">
        <h2>Events</h2>
        <div class="row">
          <label>Event</label>
          <input id="evtName" value="web.message" placeholder="Event name" />
        </div>
        <div class="row">
          <label>Data</label>
          <input
            id="evtData"
            value='{"text": "hello"}'
            placeholder="JSON data"
          />
        </div>
        <button id="btnEmit" disabled>Publish to Server</button>
      </div>

      <!-- Log -->
      <div class="card full">
        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
          "
        >
          <h2>Log</h2>
          <button id="btnClear" style="margin: 0; padding: 4px 12px">
            Clear
          </button>
        </div>
        <div class="log" id="log"></div>
      </div>
    </div>

    <script type="module">
      // Browser: no WebSocket option needed — uses native WebSocket
      import { RpcClient } from "../../src/client.ts";

      const $ = (id) => document.getElementById(id);

      let rpc = null;

      function log(type, text) {
        const el = $("log");
        const time = new Date().toLocaleTimeString();
        el.innerHTML += `<div><span class="time">[${time}]</span> <span class="${type}">${escHtml(text)}</span></div>`;
        el.scrollTop = el.scrollHeight;
      }

      function escHtml(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function setConnected(on) {
        $("statusDot").className = `dot ${on ? "on" : "off"}`;
        $("statusText").textContent = on ? "Connected" : "Disconnected";
        $("btnConnect").disabled = on;
        $("btnDisconnect").disabled = !on;
        for (const btn of document.querySelectorAll(
          "button[id^=btn]:not(#btnConnect):not(#btnDisconnect):not(#btnClear)",
        )) {
          btn.disabled = !on;
        }
      }

      function parseJson(s) {
        try {
          return JSON.parse(s);
        } catch {
          return {};
        }
      }

      // Connect
      $("btnConnect").onclick = () => {
        const url = $("wsUrl").value;
        const token = $("wsToken").value;
        rpc = new RpcClient(url, {
          token,
          role: "web",
          clientId: `web-${Date.now()}`,
        });

        rpc.onConnect = () => {
          setConnected(true);
          log("in", "Connected & authenticated");
        };
        rpc.onDisconnect = () => {
          setConnected(false);
          log("err", "Disconnected");
        };
        rpc.onAuthFailed = () => log("err", "Auth failed");

        rpc.subscribe("server.heartbeat", (d) =>
          log("evt", `[notification] server.heartbeat: ${JSON.stringify(d)}`),
        );
        rpc.subscribe("node.status", (d) =>
          log("evt", `[notification] node.status: ${JSON.stringify(d)}`),
        );

        rpc.register("web.ping", () => ({ pong: true, from: "web" }));

        log("out", `Connecting to ${url}...`);
        rpc.connect();
      };

      $("btnDisconnect").onclick = () => {
        rpc?.disconnect();
      };

      // RPC calls to Python
      $("btnCall").onclick = async () => {
        const method = $("rpcMethod").value;
        const params = parseJson($("rpcParams").value);
        log("out", `-> ${method}(${JSON.stringify(params)})`);
        try {
          const r = await rpc.request(method, params);
          log("in", `<- ${JSON.stringify(r)}`);
        } catch (e) {
          log("err", `Error: ${e.message}`);
        }
      };

      $("btnCallAdd").onclick = async () => {
        log("out", "-> add({a:3, b:7})");
        try {
          const r = await rpc.request("add", { a: 3, b: 7 });
          log("in", `<- ${JSON.stringify(r)}`);
        } catch (e) {
          log("err", `Error: ${e.message}`);
        }
      };

      $("btnCallTime").onclick = async () => {
        log("out", "-> server.time()");
        try {
          const r = await rpc.request("server.time");
          log("in", `<- ${JSON.stringify(r)}`);
        } catch (e) {
          log("err", `Error: ${e.message}`);
        }
      };

      // Events
      $("btnEmit").onclick = () => {
        const event = $("evtName").value;
        const data = parseJson($("evtData").value);
        rpc.publish(event, data);
        log("out", `publish ${event}: ${JSON.stringify(data)}`);
      };

      $("btnClear").onclick = () => {
        $("log").innerHTML = "";
      };
    </script>
  </body>
</html>
