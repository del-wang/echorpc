name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

defaults:
  run:
    working-directory: python

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - run: uv build

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/
